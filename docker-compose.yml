version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: crypto_postgres

    restart: always

    environment:

      POSTGRES_DB: crypto_db

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  crypto_etl:

    build: .

    container_name: crypto_pipeline

    depends_on:

      - postgres

    env_file:

      - .env

volumes:

  postgres_data: